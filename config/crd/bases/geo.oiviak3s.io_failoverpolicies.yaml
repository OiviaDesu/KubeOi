                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastFailoverTime:
                description: LastFailoverTime is when the last failover occurred
                format: date-time
                type: string
              recentEvents:
                description: RecentEvents lists recent failover events
                items:
                  description: FailoverEvent represents a single failover event
                  properties:
                    duration:
                      description: Duration is how long the failover took
                      type: string
                    reason:
                      description: Reason explains why failover occurred
                      type: string
                    sourceNode:
                      description: SourceNode is the node where workload was running
                      type: string
                    success:
                      description: Success indicates if failover succeeded
                      type: boolean
                    targetNode:
                      description: TargetNode is the node where workload was moved
                        to
                      type: string
                    timestamp:
                      description: Timestamp is when this event occurred
                      format: date-time
                      type: string
                    workloadName:
                      description: WorkloadName is the name of the workload that failed
                        over
                      type: string
                  required:
                  - duration
                  - reason
                  - sourceNode
                  - success
                  - targetNode
                  - timestamp
                  - workloadName
                  type: object
                type: array
              totalFailovers:
                description: TotalFailovers is the total number of failovers performed
                format: int32
                type: integer
            required:
            - active
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
