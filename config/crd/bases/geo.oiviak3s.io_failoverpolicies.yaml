kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: failoverpolicies.geo.oiviak3s.io
spec:
  group: geo.oiviak3s.io
  names:
    kind: FailoverPolicy
    listKind: FailoverPolicyList
    plural: failoverpolicies
    singular: failoverpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.strategy.type
      name: Strategy
      type: string
    - jsonPath: .status.active
      name: Active
      type: boolean
    - jsonPath: .status.totalFailovers
      name: Failovers
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: FailoverPolicy defines failover behavior and triggers
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FailoverPolicySpec defines the desired state of FailoverPolicy
            properties:
              enabled:
                default: true
                description: Enabled determines if this policy is active
                type: boolean
              notificationRule:
                description: NotificationRule defines notification behavior
                properties:
                  enabled:
                    default: true
                    description: Enabled determines if notifications are enabled
                    type: boolean
                  minSeverity:
                    default: warning
                    description: MinSeverity is the minimum severity to trigger notification
                    enum:
                    - info
                    - warning
                    - critical
                    type: string
                  onFailoverComplete:
                    default: true
                    description: OnFailoverComplete sends notification when failover
                      completes
                    type: boolean
                  onFailoverFailed:
                    default: true
                    description: OnFailoverFailed sends notification when failover
                      fails
                    type: boolean
                  onFailoverStart:
                    default: true
                    description: OnFailoverStart sends notification when failover
                      starts
                    type: boolean
                  onNodeHealthChange:
                    default: false
                    description: OnNodeHealthChange sends notification when node health
                      changes
                    type: boolean
                type: object
              strategy:
                description: Strategy defines how failover is executed
                properties:
                  drainTimeout:
                    default: 5m
                    description: DrainTimeout is the timeout for draining nodes during
                      graceful failover
                    type: string
                  gracePeriod:
                    default: 30s
                    description: GracePeriod is the grace period for pod termination
                    type: string
                  targetRegionPreference:
                    description: TargetRegionPreference specifies preferred failover
                      target regions
                    items:
                      type: string
                    type: array
                  type:
                    default: graceful
                    description: Type specifies the failover strategy type
                    enum:
                    - immediate
                    - graceful
                    - manual
                    type: string
                type: object
              targetWorkloads:
                description: |-
                  TargetWorkloads lists workloads this policy applies to
                  Empty list means apply to all workloads
                items:
                  type: string
                type: array
              trigger:
                description: Trigger defines what triggers a failover
                properties:
                  nodeUnhealthyDuration:
                    default: 2m
                    description: NodeUnhealthyDuration is how long a node must be
                      unhealthy before failover
                    type: string
                  regionalOutage:
                    default: true
                    description: RegionalOutage triggers failover when all nodes in
                      a region are unhealthy
                    type: boolean
                  workloadUnhealthyDuration:
                    default: 1m
                    description: WorkloadUnhealthyDuration is how long a workload
                      must be unhealthy before failover
                    type: string
                type: object
            type: object
          status:
            description: FailoverPolicyStatus defines the observed state of FailoverPolicy
            properties:
              active:
                description: Active indicates if this policy is currently active
                type: boolean
              conditions:
                description: Conditions represent the latest available observations
                  of the policy's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
