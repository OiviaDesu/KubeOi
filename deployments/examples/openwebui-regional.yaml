apiVersion: geo.oiviak3s.io/v1alpha1
kind: RegionalWorkload
metadata:
  name: openwebui
  namespace: openwebui
spec:
  workloadRef:
    kind: Deployment
    name: openwebui
  placementConstraints:
    # Prefer Hanoi region for low latency
    regionPreference:
    - hanoi
    - cloud
    
    # Require primary or secondary tier nodes
    tierPreference:
    - primary
    - secondary
    
    # Must have high power stability
    requireLabels:
      oiviak3s.io/power-stability: high
    
    # Avoid specific nodes with known issues
    avoidNodes: []
    
    # Prefer not to co-locate with another OpenWebUI workload
    antiAffinity:
    - openwebui

  # Shared endpoint keeps one stable IP during failover/failback
  sharedEndpoint:
    enabled: true
    mode: kube-vip
    ip: 192.168.86.8
    autoFailback: true
  
  failoverConfig:
    enabled: true
    maxFailoverTime: 5m
    minHealthyReplicas: 1
    healthCheckGracePeriod: 1m

  notificationEnabled: true
