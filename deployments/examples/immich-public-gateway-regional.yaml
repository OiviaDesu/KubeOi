---
apiVersion: v1
kind: ConfigMap
metadata:
  name: immich-public-gateway
  namespace: immich
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
    defaults
      log global
      mode http
      timeout connect 5s
      timeout client 2m
      timeout server 2m
    frontend immich_http
      bind *:80
      default_backend immich_http_out
    backend immich_http_out
      option httpchk GET /api/server/ping
      http-check expect string pong
      server immich immich-server.immich.svc.cluster.local:2283 check
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-public-gateway
  namespace: immich
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: immich-public-gateway
  template:
    metadata:
      labels:
        app: immich-public-gateway
    spec:
      containers:
        - name: haproxy
          image: haproxy:3.1.5-alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/server/ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/server/ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: haproxy-config
          configMap:
            name: immich-public-gateway
---
apiVersion: geo.oiviak3s.io/v1alpha1
kind: RegionalWorkload
metadata:
  name: immich-public-gateway
  namespace: immich
spec:
  workloadRef:
    kind: Deployment
    name: immich-public-gateway
    namespace: immich
  placementConstraints:
    regionPreference:
      - hanoi
      - melbourne
    requireLabels:
      oiviak3s.io/power-stability: high
    antiAffinity: []
  sharedEndpoint:
    enabled: true
    mode: kube-vip
    ip: 192.168.86.8
    autoFailback: true
  failoverConfig:
    enabled: true
    maxFailoverTime: 5m
    minHealthyReplicas: 1
    healthCheckGracePeriod: 1m
  notificationEnabled: true
