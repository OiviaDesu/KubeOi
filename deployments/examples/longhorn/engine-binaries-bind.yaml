apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: longhorn-engine-binaries-bind
  namespace: longhorn-system
  labels:
    app: longhorn-engine-binaries-bind
spec:
  selector:
    matchLabels:
      app: longhorn-engine-binaries-bind
  template:
    metadata:
      labels:
        app: longhorn-engine-binaries-bind
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
      - operator: Exists
      containers:
      - name: mounter
        image: alpine:3.19
        securityContext:
          privileged: true
        command:
        - sh
        - -c
        - |
          set -e
          apk add --no-cache util-linux
          nsenter -t 1 -m -- mkdir -p /home/longhorn/engine-binaries /var/lib/longhorn/engine-binaries
          nsenter -t 1 -m -- mount --bind /home/longhorn/engine-binaries /var/lib/longhorn/engine-binaries
          nsenter -t 1 -m -- sh -c "grep -q '/home/longhorn/engine-binaries /var/lib/longhorn/engine-binaries' /etc/fstab || echo '/home/longhorn/engine-binaries /var/lib/longhorn/engine-binaries none bind 0 0' >> /etc/fstab"
          sleep 3600
        volumeMounts:
        - name: host
          mountPath: /host
      volumes:
      - name: host
        hostPath:
          path: /
