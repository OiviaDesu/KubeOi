---
apiVersion: v1
kind: Namespace
metadata:
  name: plex
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config
  namespace: plex
  annotations:
    autoscaling.oiviak3s.io/pvc-autogrow: "true"
    autoscaling.oiviak3s.io/max-size: 20Gi
    autoscaling.oiviak3s.io/threshold-percent: "80"
    autoscaling.oiviak3s.io/growth-percent: "50"
    autoscaling.oiviak3s.io/min-growth: 2Gi
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-autogrow
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-media
  namespace: plex
  annotations:
    autoscaling.oiviak3s.io/pvc-autogrow: "true"
    autoscaling.oiviak3s.io/max-size: 2Ti
    autoscaling.oiviak3s.io/threshold-percent: "75"
    autoscaling.oiviak3s.io/growth-percent: "50"
    autoscaling.oiviak3s.io/min-growth: 10Gi
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-autogrow
  resources:
    requests:
      storage: 200Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      containers:
        - name: plex
          image: linuxserver/plex:latest
          ports:
            - name: plex
              containerPort: 32400
              protocol: TCP
            - name: gdm-1900
              containerPort: 1900
              protocol: UDP
            - name: gdm-32410
              containerPort: 32410
              protocol: UDP
            - name: gdm-32412
              containerPort: 32412
              protocol: UDP
            - name: gdm-32413
              containerPort: 32413
              protocol: UDP
            - name: gdm-32414
              containerPort: 32414
              protocol: UDP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Asia/Ho_Chi_Minh"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data
            - name: transcode
              mountPath: /transcode
          readinessProbe:
            tcpSocket:
              port: 32400
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 32400
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config
        - name: media
          persistentVolumeClaim:
            claimName: plex-media
        - name: transcode
          emptyDir:
            sizeLimit: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: plex
spec:
  type: ClusterIP
  selector:
    app: plex
  ports:
    - name: plex
      port: 32400
      targetPort: 32400
      protocol: TCP
    - name: gdm-1900
      port: 1900
      targetPort: 1900
      protocol: UDP
    - name: gdm-32410
      port: 32410
      targetPort: 32410
      protocol: UDP
    - name: gdm-32412
      port: 32412
      targetPort: 32412
      protocol: UDP
    - name: gdm-32413
      port: 32413
      targetPort: 32413
      protocol: UDP
    - name: gdm-32414
      port: 32414
      targetPort: 32414
      protocol: UDP
---
apiVersion: geo.oiviak3s.io/v1alpha1
kind: RegionalWorkload
metadata:
  name: plex
  namespace: plex
spec:
  workloadRef:
    kind: Deployment
    name: plex
    namespace: plex
  placementConstraints:
    regionPreference:
      - hanoi
  sharedEndpoint:
    enabled: true
    mode: kube-vip
    ip: 192.168.86.8
    autoFailback: true
  failoverConfig:
    enabled: true
    maxFailoverTime: 5m
    minHealthyReplicas: 1
    healthCheckGracePeriod: 1m
  notificationEnabled: true
