---
apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-data
  namespace: minecraft
  annotations:
    autoscaling.oiviak3s.io/pvc-autogrow: "true"
    autoscaling.oiviak3s.io/max-size: 100Gi
    autoscaling.oiviak3s.io/threshold-percent: "75"
    autoscaling.oiviak3s.io/growth-percent: "50"
    autoscaling.oiviak3s.io/min-growth: 5Gi
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-autogrow
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft
  namespace: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      nodeSelector:
        kubernetes.io/hostname: oiviax509fj-master
      containers:
        - name: minecraft
          image: itzg/minecraft-server:latest
          ports:
            - containerPort: 25565
              name: minecraft
          env:
            - name: EULA
              value: "TRUE"
            - name: MEMORY
              value: "1024M"
            - name: VERSION
              value: "latest"
            - name: MODE
              value: "survival"
            - name: MOTD
              value: "Oiviak3s Minecraft Server"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-data
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft
  namespace: minecraft
spec:
  type: NodePort
  selector:
    app: minecraft
  ports:
    - name: minecraft
      port: 25565
      targetPort: 25565
      nodePort: 30565
---
apiVersion: geo.oiviak3s.io/v1alpha1
kind: RegionalWorkload
metadata:
  name: minecraft
  namespace: minecraft
spec:
  workloadRef:
    kind: Deployment
    name: minecraft
    namespace: minecraft
  placementConstraints:
    regionPreference:
      - hanoi
  failoverConfig:
    enabled: true
    maxFailoverTime: 5m
    minHealthyReplicas: 1
  notificationEnabled: true
