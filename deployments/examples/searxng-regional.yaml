apiVersion: geo.oiviak3s.io/v1alpha1
kind: RegionalWorkload
metadata:
  name: searxng
  namespace: searxng
spec:
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: searxng
    namespace: searxng
  placementConstraints:
    # Prefer Hanoi region first, Melbourne second
    regionPreference:
    - hanoi
    - melbourne
    
    # Prioritize stronger nodes; keep tertiary only for emergency
    tierPreference:
    - primary
    - secondary
    - tertiary
    
    requireLabels: {}
    
    avoidNodes:
    - oiviax509fj-master
    
    # Avoid co-locating with same app where possible
    antiAffinity:
    - searxng

  # Shared endpoint keeps one stable IP during failover/failback
  sharedEndpoint:
    enabled: true
    mode: kube-vip
    ip: 192.168.86.8
    autoFailback: true

  failoverConfig:
    enabled: true
    maxFailoverTime: 5m
    minHealthyReplicas: 1
    healthCheckGracePeriod: 1m

  notificationEnabled: true
