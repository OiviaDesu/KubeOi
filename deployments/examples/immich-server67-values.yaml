controllers:
  main:
    containers:
      main:
        image:
          tag: v2.0.0
        env:
          REDIS_HOSTNAME: immich-valkey
          IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003

# Force all Immich components onto server67
# (supported by bjw-s common library used by this chart)
defaultPodOptions:
  nodeSelector:
    kubernetes.io/hostname: oiviax509fj-master

server:
  controllers:
    main:
      containers:
        main:
          resources:
            requests:
              cpu: 300m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          env:
            DB_HOSTNAME:
              value: immich-database-rw
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: user
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: password
            DB_DATABASE_NAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: dbname
            DB_VECTOR_EXTENSION: vectorchord

valkey:
  enabled: true

immich:
  persistence:
    library:
      existingClaim: immich-library-pvc
