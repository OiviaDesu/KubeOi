---
apiVersion: v1
kind: Namespace
metadata:
  name: searxng
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: searxng-data
  namespace: searxng
  annotations:
    autoscaling.oiviak3s.io/pvc-autogrow: "true"
    autoscaling.oiviak3s.io/max-size: 20Gi
    autoscaling.oiviak3s.io/threshold-percent: "80"
    autoscaling.oiviak3s.io/growth-percent: "50"
    autoscaling.oiviak3s.io/min-growth: 1Gi
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-autogrow
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
spec:
  replicas: 2
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
                  - key: node-role.kubernetes.io/master
                    operator: DoesNotExist
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - oiviamacmini-worker
                      - oiviapi-worker
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - oiviamacmini-worker
            - weight: 20
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - oiviapi-worker
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: searxng
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: searxng
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/cache/searxng
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: searxng-data
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: searxng
spec:
  selector:
    app: searxng
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30084
---
apiVersion: geo.oiviak3s.io/v1alpha1
kind: RegionalWorkload
metadata:
  name: searxng
  namespace: searxng
spec:
  workloadRef:
    apiVersion: apps/v1
    kind: Deployment
    name: searxng
    namespace: searxng
  placementConstraints:
    regionPreference:
      - hanoi
      - melbourne
    tierPreference:
      - secondary
      - tertiary
    requireLabels: {}
    avoidNodes:
      - oiviax509fj-master
    antiAffinity: []
  failoverConfig:
    enabled: true
    maxFailoverTime: 5m
    minHealthyReplicas: 2
  notificationEnabled: true
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: searxng-pdb
  namespace: searxng
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: searxng
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: searxng
  namespace: searxng
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: searxng
  minReplicas: 2
  maxReplicas: 3
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
