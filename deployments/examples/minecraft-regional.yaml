apiVersion: geo.oiviak3s.io/v1alpha1
kind: RegionalWorkload
metadata:
  name: minecraft-server
  namespace: minecraft
spec:
  workloadRef:
    kind: StatefulSet
    name: minecraft-server
  placementConstraints:
    # Prefer high-performance nodes
    regionPreference:
    - hanoi
    - cloud
    
    # Avoid resource-constrained nodes
    avoidNodes:
    - pi400  # Not enough resources for Minecraft
    
    # Require primary or secondary tier
    tierPreference:
    - primary
    - secondary
    
    # Need stable power for persistent world data
    requireLabels:
      oiviak3s.io/power-stability: high
    
    # No anti-affinity since it's a single-instance server
    antiAffinity: []

  # Shared endpoint keeps one stable IP during failover/failback
  sharedEndpoint:
    enabled: true
    mode: kube-vip
    ip: 192.168.86.8
    autoFailback: true
  
  failoverConfig:
    enabled: true
    maxFailoverTime: 10m
    minHealthyReplicas: 1
    healthCheckGracePeriod: 2m

  notificationEnabled: true
