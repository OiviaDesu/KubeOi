---
apiVersion: v1
kind: Namespace
metadata:
  name: kubernetes-dashboard
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-dashboard-public-gateway
  namespace: kubernetes-dashboard
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
    defaults
      log global
      mode tcp
      timeout connect 5s
      timeout client 1m
      timeout server 1m
    frontend dashboard_tls_in
      bind *:9443
      default_backend dashboard_tls_out
    backend dashboard_tls_out
      option tcp-check
      server dashboard kubernetes-dashboard-kong-proxy.kubernetes-dashboard.svc.cluster.local:443 check
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-dashboard-gateway
  namespace: kubernetes-dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: kubernetes-dashboard-gateway
  template:
    metadata:
      labels:
        app: kubernetes-dashboard-gateway
    spec:
      containers:
        - name: haproxy
          image: haproxy:3.1.5-alpine
          ports:
            - name: https-dashboard
              containerPort: 9443
              protocol: TCP
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 9443
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9443
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: haproxy-config
          configMap:
            name: kubernetes-dashboard-public-gateway
---
apiVersion: geo.oiviak3s.io/v1alpha1
kind: RegionalWorkload
metadata:
  name: kubernetes-dashboard-gateway
  namespace: kubernetes-dashboard
spec:
  workloadRef:
    kind: Deployment
    name: kubernetes-dashboard-gateway
    namespace: kubernetes-dashboard
  placementConstraints:
    # Prefer Hanoi first, then Melbourne. Tertiary nodes remain last-resort only.
    regionPreference:
      - hanoi
      - melbourne
    requireLabels:
      oiviak3s.io/power-stability: high
  sharedEndpoint:
    enabled: true
    mode: kube-vip
    ip: 192.168.86.8
    autoFailback: true
  failoverConfig:
    enabled: true
    maxFailoverTime: 5m
    minHealthyReplicas: 1
    healthCheckGracePeriod: 1m
  notificationEnabled: true
