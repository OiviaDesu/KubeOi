---
apiVersion: v1
kind: Namespace
metadata:
  name: openwebui
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-data
  namespace: openwebui
  annotations:
    autoscaling.oiviak3s.io/pvc-autogrow: "true"
    autoscaling.oiviak3s.io/max-size: 50Gi
    autoscaling.oiviak3s.io/threshold-percent: "80"
    autoscaling.oiviak3s.io/growth-percent: "50"
    autoscaling.oiviak3s.io/min-growth: 2Gi
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-autogrow
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: openwebui
spec:
  type: NodePort
  selector:
    app: openwebui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: geo.oiviak3s.io/v1alpha1
kind: RegionalWorkload
metadata:
  name: openwebui
  namespace: openwebui
spec:
  workloadRef:
    kind: Deployment
    name: openwebui
    namespace: openwebui
  placementConstraints:
    regionPreference:
      - hanoi
      - melbourne
  failoverConfig:
    enabled: true
    maxFailoverTime: 5m
    minHealthyReplicas: 1
  notificationEnabled: true
