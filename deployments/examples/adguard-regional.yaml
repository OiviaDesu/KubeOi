apiVersion: geo.oiviak3s.io/v1alpha1
kind: RegionalWorkload
metadata:
  name: adguard-emergency
  namespace: adguard
spec:
  workloadRef:
    kind: Deployment
    name: adguard-home
  placementConstraints:
    # Emergency profile - can run on any available node
    regionPreference:
    - hanoi
    - cloud
    
    # Accept tertiary tier for emergency fallback
    tierPreference:
    - primary
    - secondary
    - tertiary
    
    # No strict requirements for emergency mode
    requireLabels: {}
    
    # Can even run on pi400 if needed
    avoidNodes: []
    
    # No anti-affinity - just get it running
    antiAffinity: []

  # Shared endpoint keeps one stable IP during failover/failback
  sharedEndpoint:
    enabled: true
    mode: kube-vip
    ip: 192.168.86.8
    autoFailback: true
  
  failoverConfig:
    enabled: true
    maxFailoverTime: 5m
    minHealthyReplicas: 1
    healthCheckGracePeriod: 1m

  notificationEnabled: true
